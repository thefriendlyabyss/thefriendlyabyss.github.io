<nav class="navbar navbar-expand-xl navbar-light fixed-top navbar-custom {% if page.nav-short %}top-nav-short-permanent{% else %}top-nav-regular{% endif %}">

  <button class="navbar-toggler" type="button" data-toggle="collapse" 
    data-target="#main-navbar" aria-controls="main-navbar" 
    aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="main-navbar">
    <div class="navbar-split-layout">

      <!-- Left two links -->
      <ul class="navbar-nav nav-left">
        <li class="nav-item">
          <a class="nav-link" href="{{ '/film' | relative_url }}">About The Film</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ '/crew' | relative_url }}">Crew</a>
        </li>
      </ul>

      <!-- Center spacer for avatar -->
      <div class="avatar-spacer">
        <a href="{{ '/' | absolute_url }}" class="navbar-scroll-avatar-link">
          <img class="navbar-scroll-avatar" 
               src="{{ site.avatar | relative_url }}" 
               alt="El Pinero" />
        </a>
      </div>

      <!-- Right two links -->
      <ul class="navbar-nav nav-right">
        <li class="nav-item">
          <a class="nav-link" href="{{ '/blog' | relative_url }}">Updates</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="https://ko-fi.com/elpinero" target="_blank">Support The Film</a>
        </li>
      </ul>

    </div>
  </div>

  {% if site.avatar and page.show-avatar != false %}
    <div class="avatar-container">
      <div class="avatar-img-border">
        <a href="{{ '/' | absolute_url }}">
          <img alt="Navigation bar avatar" class="avatar-img" 
               src="{{ site.avatar | relative_url }}" />
        </a>
      </div>
    </div>
  {% endif %}
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const toggler = document.querySelector('.navbar-toggler');
        const avatar = document.querySelector('.avatar-container');
    
        if (!toggler || !avatar) return;
    
        function isMobile() {
          return window.innerWidth <= 768;
        }
    
        // Show avatar on mobile initially
        if (isMobile()) {
          avatar.style.opacity = '1';
          avatar.style.visibility = 'visible';
        }
    
        // Keep avatar visible on mobile when scrolling
        window.addEventListener('scroll', function() {
          if (isMobile()) {
            avatar.style.opacity = '1';
            avatar.style.visibility = 'visible';
          }
        });
    
        // Handle hamburger toggle
        toggler.addEventListener('click', function() {
          if (!isMobile()) return;
          const isCurrentlyOpen = toggler.getAttribute('aria-expanded') === 'true';
          avatar.style.transition = 'opacity 0.3s ease, visibility 0.3s ease';
          if (!isCurrentlyOpen) {
            avatar.style.opacity = '0';
            avatar.style.visibility = 'hidden';
          } else {
            avatar.style.opacity = '1';
            avatar.style.visibility = 'visible';
          }
        });
      });
  </script>
</nav>
{% include search.html %}
